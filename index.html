<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>kedy / TRAINING</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="筋トレ">
<meta name="theme-color" content="#0a0a0c">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<style>
  :root{
    --bg:#0a0a0c;
    --card:#141419;
    --card2:#1d1d24;
    --line:#2c2c35;
    --text:#fafafa;
    --sub:#a2a2ad;
    --accent:#6d5cff;    /* kedy indigo, 明るめ調整 */
    --accent2:#8a7bff;
    --dim:#5c5c66;
    --want:#ffc234;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text);
    font-family:"Helvetica Neue",Helvetica,Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    -webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:620px;margin:0 auto;
    padding:calc(24px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) calc(48px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left))}

  /* header */
  .brand{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--sub)}
  .h1{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1.05;margin-top:6px}
  .h1 span{color:var(--accent)}
  .today{font-size:13px;color:var(--sub);margin-top:8px}

  /* day tabs */
  .tabs{display:flex;gap:8px;margin:22px 0 14px}
  .tab{flex:1;padding:15px 10px;border:1.5px solid var(--line);border-radius:14px;background:var(--card);
    cursor:pointer;text-align:left;transition:.15s;color:var(--text)}
  .tab .n{font-size:18px;font-weight:800;letter-spacing:-.01em;display:block}
  .tab .m{font-size:11px;color:var(--sub);margin-top:4px;display:block}
  .tab[aria-selected="true"]{background:var(--accent);border-color:var(--accent)}
  .tab[aria-selected="true"] .n,.tab[aria-selected="true"] .m{color:#fff}
  .tab[data-day="light"][aria-selected="true"]{background:#2f9e63;border-color:#2f9e63}
  .tab:focus-visible{outline:2px solid var(--accent2);outline-offset:3px}
  .rec{display:none;font-size:9px;font-weight:700;letter-spacing:.06em;color:#fff;background:var(--accent2);
    border-radius:5px;padding:2px 6px;margin-left:6px;vertical-align:2px}
  .tab[aria-selected="true"] .rec{background:rgba(255,255,255,.28)}

  /* meta */
  .meta{display:flex;gap:10px;margin-bottom:8px}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .stat .l{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--sub)}
  .stat .v{font-size:17px;font-weight:700;margin-top:3px}
  .stat .v b{color:var(--accent2)}

  /* calendar */
  .cal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:8px}
  .cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .cal-head button{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--card2);color:var(--text);font-size:18px;cursor:pointer;line-height:1}
  .cal-title{font-size:15px;font-weight:800;letter-spacing:.02em}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-dow{text-align:center;font-size:10px;color:var(--sub);padding:3px 0 6px}
  .cal-dow.sat{color:#4a9eff}
  .cal-dow.sun{color:#ff5a5f}
  .cal-cell{height:40px;display:flex;align-items:center;justify-content:center;
    border-radius:9px;font-size:12.5px;color:var(--text)}
  .cal-cell.sat{color:#4a9eff}
  .cal-cell.sun{color:#ff5a5f}
  .cal-cell.done{color:#fff;font-weight:800}
  .cal-cell.done.push{background:#6d5cff}
  .cal-cell.done.pull{background:#3d8fe0}
  .cal-cell.done.light{background:#2f9e63}
  .cal-cell.done.push.pt{background:rgba(109,92,255,.34)}
  .cal-cell.done.pull.pt{background:rgba(61,143,224,.34)}
  .cal-cell.done.light.pt{background:rgba(47,158,99,.38)}
  .cal-cell.today{border:1.5px solid var(--accent2);font-weight:800}
  .cal-cell.done.today{border-color:#fff}
  .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .dot.push{background:#6d5cff}
  .dot.pull{background:#3d8fe0}
  .dot.light{background:#2f9e63}
  .cal-leg{display:flex;gap:12px;flex-wrap:wrap;font-size:10.5px;color:var(--sub);margin-top:12px;align-items:center}
  .cal-leg span{display:inline-flex;align-items:center;gap:4px}

  /* section heading */
  .sec{font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--sub);margin:26px 2px 12px}

  /* exercise card */
  .list{display:flex;flex-direction:column;gap:10px}
  .ex{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px;cursor:pointer;transition:.12s;user-select:none}
  .ex:hover{border-color:#3a3a45}
  .ex:focus-visible{outline:2px solid var(--accent2);outline-offset:2px}
  .box{width:30px;height:30px;flex:none;border:2px solid #3a3a45;border-radius:9px;position:relative;transition:.12s}
  .ex .body{flex:1;min-width:0}
  .name{font-size:18px;font-weight:700;letter-spacing:-.01em}
  .sub{font-size:13px;color:var(--sub);margin-top:3px}
  .howto{flex:none;font-size:13px;font-weight:600;color:var(--accent2);border:1.5px solid #34343f;
    border-radius:10px;padding:9px 13px;transition:.12s;white-space:nowrap}
  .howto:hover{border-color:var(--accent2);background:rgba(109,92,255,.12)}
  .howto:focus-visible{outline:2px solid var(--accent2);outline-offset:2px}
  /* done state */
  .ex.on{background:#101014;border-color:#222}
  .ex.on .box{background:var(--accent);border-color:var(--accent)}
  .ex.on .box::after{content:"";position:absolute;left:9px;top:3px;width:8px;height:15px;
    border:solid #fff;border-width:0 3px 3px 0;transform:rotate(45deg)}
  .ex.on .name{color:var(--dim);text-decoration:line-through}
  .ex.on .sub{color:var(--dim)}

  .opt{border-style:dashed}
  .mtag{display:inline-block;font-size:12px;font-weight:800;color:#0a0a0c;border-radius:6px;
    padding:2px 9px;margin-right:9px;vertical-align:middle}
  .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;color:#fff;
    background:#34343f;border-radius:5px;padding:2px 7px;margin-left:8px;vertical-align:middle}
  .badge.bar{background:var(--accent);color:#fff}
  .anat{flex:none;width:32px;display:flex;flex-direction:column;align-items:center;gap:2px}
  .anat svg{width:30px;height:48px;display:block}
  .anat .side{font-size:9px;color:var(--sub);letter-spacing:.08em}
  .care{font-size:11.5px;color:#e8b04b;margin-top:6px;line-height:1.5}
  .ex.on .care{color:var(--dim)}
  .wctl{display:flex;align-items:center;gap:8px;margin-top:10px}
  .wbtn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--line);background:var(--card2);
    color:var(--text);font-size:19px;font-weight:700;cursor:pointer;line-height:1}
  .wbtn:active{background:var(--accent);border-color:var(--accent);color:#fff}
  .wval{min-width:56px;text-align:center;font-size:18px;font-weight:800;letter-spacing:-.01em}
  .wval small{font-size:11px;color:var(--sub);margin-left:2px;font-weight:600}
  .wnote{font-size:10px;color:var(--dim)}
  .ex.on .wctl{opacity:.35}
  .note{font-size:12px;color:var(--sub);margin:8px 2px 0;padding-left:12px;border-left:2px solid var(--accent)}

  /* follow-along video */
  .vid{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:16px;transition:.12s;cursor:pointer}
  .vid:hover{border-color:var(--accent2);background:var(--card2)}
  .vid .pl{width:36px;height:36px;flex:none;border-radius:9px;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:14px}
  .vid .vn{font-size:15px;font-weight:600}
  .vid .vt{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--sub);margin-top:2px}
  .want{color:var(--want);font-weight:700;margin-left:6px;font-size:12px}

  /* done button */
  .done{width:100%;margin-top:26px;padding:19px;border:none;border-radius:14px;background:var(--accent);
    color:#fff;font-size:16px;font-weight:800;letter-spacing:.04em;cursor:pointer;transition:.15s}
  .done:hover{background:var(--accent2)}
  .done:active{transform:scale(.99)}
  .done:focus-visible{outline:2px solid #fff;outline-offset:3px}
  .toast{text-align:center;font-size:13px;font-weight:600;color:var(--accent2);margin-top:14px;
    min-height:18px;opacity:0;transition:.3s}
  .toast.show{opacity:1}

  .foot{margin-top:30px;font-size:12px;color:var(--dim);text-align:center;line-height:1.8}

  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">kedy — home training</div>
  <div class="h1">今日のトレ<span>.</span></div>
  <div class="today" id="today"></div>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" data-day="push"><span class="n">PUSH日<span class="rec">おすすめ</span></span><span class="m">胸·肩·三頭·腹</span></button>
    <button class="tab" role="tab" data-day="pull"><span class="n">PULL日<span class="rec">おすすめ</span></span><span class="m">背中·二頭·腹</span></button>
    <button class="tab" role="tab" data-day="light"><span class="n">軽め<span class="rec">おすすめ</span></span><span class="m">筋肉痛の日</span></button>
  </div>

  <div class="meta">
    <div class="stat"><div class="l">前回</div><div class="v" id="last">—</div></div>
    <div class="stat"><div class="l">今週</div><div class="v"><b id="week">0</b> 日</div></div>
  </div>

  <div class="cal">
    <div class="cal-head">
      <button id="calPrev" aria-label="前の月">‹</button>
      <span class="cal-title" id="calTitle"></span>
      <button id="calNext" aria-label="次の月">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-leg">
      <span><i class="dot push"></i>PUSH</span>
      <span><i class="dot pull"></i>PULL</span>
      <span><i class="dot light"></i>軽め</span>
      <span style="color:var(--dim)">濃い = 全種目 ・ 薄い = 一部だけ ・ 空白 = やってない</span>
    </div>
  </div>

  <div class="sec">📋 今日の種目 — タップした瞬間に自動で記録 ・ ±で重さ ・ 解説 ▷</div>
  <div class="list" id="list"></div>

  <div class="sec" id="vidSec">🎬 一緒にやる動画 — 流しながらトレ（時間ない日はコレだけでもOK）</div>
  <div class="list" id="videos"></div>

  <div class="toast" id="toast"></div>

  <div class="foot">
    チェックした瞬間に自動保存。完了ボタンは無し＝押し忘れゼロ。<br>
    重さは前回より少しでも増やせたら勝ち。記録はこの端末に保存される。
  </div>
</div>

<script>
/* ===== data ===== */
const W = {

      {n:"プッシュアップバー腕立て", m:"胸", mc:"chest", s:"三頭も ・ 限界まで×3", c:"体は一直線・深く下ろしすぎて肩を痛めない", f:"https://youtu.be/gOW7hO7TQRg"},

      {n:"トライセプスエクステンション", m:"三頭", mc:"triceps", s:"二の腕裏 ・ 10回×3", w:8, c:"肘を固定して開かない", f:"https://youtu.be/z4WI-XdAJBk"},
      {n:"腹筋ローラー", m:"腹", mc:"abs", s:"お腹全体 ・ 膝コロ10回×3", c:"腰を反らない（反ると腰痛める）・膝コロから", f:"https://youtu.be/Y2ggqVV5Q1A"},
      {n:"レッグレイズ", m:"腹", mc:"abs", s:"下腹 ・ 15回×3", c:"腰を床から浮かさない・反動を使わない", f:"https://youtu.be/C9xfentB4QA"}
    ],
    opt:[
      {n:"ダンベルフライ", m:"胸", mc:"chest", s:"ストレッチ種目 ・ 12〜15回×3", w:10, tag:"任意", c:"肘は軽く曲げて固定・下ろしすぎない", f:"https://youtu.be/ls-cMaddd-4"},
      {n:"ディップス", m:"胸", mc:"chest", s:"胸下部・三頭 ・ 限界×3", tag:"腰バー", tagType:"bar", c:"肩をすくめない・沈めすぎない", f:"https://youtu.be/4NtPyLcvigw", note:"腰の高さのバーを掴んで体を沈める。前傾で胸下部、脇を締めて三頭。上半身の高負荷種目"},
      {n:"ハンギングニーレイズ", m:"腹", mc:"abs", s:"下腹 ・ 15回×3", tag:"腰バー", tagType:"bar", c:"反動を使わずゆっくり", note:"腰バーで体を支え膝を上げる。床レッグレイズと差し替えOK"}
    ],
    vid:[
      {n:"胸 2分 プッシュアップバー", u:"https://youtu.be/ZI7URsS6VrA"},

      {n:"腹筋 2分 地獄メニュー", u:"https://youtu.be/R4vb8poJnv0"}

  pull:{
    ex:[
      {n:"懸垂", m:"背中", mc:"back", s:"姿勢に最強 ・ できる回数×3", c:"反動を使わない・肩甲骨から引く", f:"https://youtu.be/leTIONGcVjs", note:"疲れる前の1種目目にやるのがコツ。回数出んくても気にせん、合計回数が増えてけばOK"},
      {n:"ワンハンドダンベルロウ", m:"背中", mc:"back", s:"二頭も ・ 左右10回×3", w:18, c:"背中を丸めない・腕やなく背中で引く", f:"https://youtu.be/71NcdOwfMv8"},
      {n:"ダンベルプルオーバー", m:"背中", mc:"back", s:"胸も ・ 10〜15回×3", w:13, u:"両手1個", c:"肘は軽く曲げて固定・重すぎ注意", f:"https://youtu.be/ygxQifjl2pQ"},
      {n:"シュラッグ", m:"僧帽筋", mc:"traps", s:"首肩 ・ 15回×3", w:18, c:"肩を回さず真上にすくめる", f:"https://youtu.be/nlouGqRR-G8"},
      {n:"ダンベルカール", m:"二頭", mc:"biceps", s:"力こぶ ・ 10回×3", w:8, c:"肘を体に固定・反動を使わない", f:"https://youtu.be/7sQ5izf39Gs"},
      {n:"ハンマーカール", m:"二頭", mc:"biceps", s:"前腕も ・ 12回×3", w:8, c:"肘固定・体を振らない", f:"https://youtu.be/R9gZHq9o5b4"},
      {n:"ロシアンツイスト", m:"腹", mc:"abs", s:"脇腹 ・ 左右20回×3", w:8, u:"両手1個", c:"背中を丸めすぎない・ゆっくり捻る", f:"https://youtu.be/nYnn7WoWFQs"},
      {n:"背中 自重3分（動画と一緒に）", m:"背中", mc:"back", s:"姿勢の締め ・ 動画1本ぶん", c:"最後のフィニッシャー。動画を流してそのままやる", f:"https://youtu.be/hj2j-RsUiSE"}
    ],
    opt:[
      {n:"斜め懸垂（インバーテッドロウ）", m:"背中", mc:"back", s:"姿勢 ・ 限界×3", tag:"腰バー", tagType:"bar", c:"体は一直線キープ", f:"https://youtu.be/43VhXUG8J-8", note:"懸垂で回数出んかった日の補助に。低いバーの下で体を斜めにして胸を引き寄せる"}
    ],
    vid:[
      {n:"背筋 6分 器具なし（床）", u:"https://youtu.be/Q-LGg-58_ZU"},
      {n:"腹筋 6分 シックスパック", u:"https://youtu.be/yfF-Q2NhVnE", want:1}
    ]
  },
  light:{
    ex:[
      {n:"腹筋 6分（動画と一緒に）", m:"腹", mc:"abs", s:"動画1本ぶん・これだけでも十分", c:"できるやつだけでOK。全部やらんでいい", f:"https://youtu.be/yfF-Q2NhVnE"},
      {n:"腹筋 2分 地獄メニュー", m:"腹", mc:"abs", s:"時間ない日はこっち", f:"https://youtu.be/R4vb8poJnv0"},
      {n:"レッグレイズ", m:"腹", mc:"abs", s:"下腹 ・ 15回×3", c:"腰を床から浮かさない", f:"https://youtu.be/C9xfentB4QA"},
      {n:"ロシアンツイスト", m:"腹", mc:"abs", s:"脇腹 ・ 左右20回（ダンベルなしでOK）", f:"https://youtu.be/nYnn7WoWFQs"},
      {n:"背中 自重3分（軽く）", m:"背中", mc:"back", s:"血流を流して回復を早める", c:"痛い部位は無理せんこと", f:"https://youtu.be/hj2j-RsUiSE"}
    ],
    opt:[

    ],
    vid:[]
  }
};
const NAME={push:"PUSH日",pull:"PULL日",light:"軽めの日"};
const MC={chest:"#ff5a5f",back:"#4a9eff",traps:"#4a9eff",shoulder:"#ff9f40",triceps:"#b06dff",biceps:"#46d17f",abs:"#2dd4bf"};
const BACKV={back:1,traps:1,triceps:1};
function bodySVG(mc){
  const c=MC[mc]||"#777", sil="#8a8a98";
  let o="";
  if(mc==="chest")o=`<ellipse cx="23.5" cy="27" rx="6.3" ry="4.4" fill="${c}"/><ellipse cx="36.5" cy="27" rx="6.3" ry="4.4" fill="${c}"/>`;

    <rect x="7.5" y="20.5" width="7" height="27" rx="3.5" fill="${sil}"/>
    <rect x="45.5" y="20.5" width="7" height="27" rx="3.5" fill="${sil}"/>
    <rect x="20.5" y="57" width="8" height="36" rx="3.5" fill="${sil}"/>
    <rect x="31.5" y="57" width="8" height="36" rx="3.5" fill="${sil}"/>
    ${o}</svg>`;

/* ===== storage (works locally & hosted; degrades in preview) ===== */
const mem={};
const S={get:k=>{try{return localStorage.getItem(k)}catch(e){return k in mem?mem[k]:null}},
         set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){mem[k]=v}}};
const gj=(k,d)=>{const v=S.get(k);if(!v)return d;try{return JSON.parse(v)}catch(e){return d}};
const sj=(k,o)=>S.set(k,JSON.stringify(o));

/* ===== helpers ===== */
const today=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
function monday(){const x=new Date();const k=(x.getDay()+6)%7;x.setHours(0,0,0,0);x.setDate(x.getDate()-k);return x}
const DAYS=()=>gj("k.days",{});
const anyChk=c=>!!c&&Object.values(c).some(v=>v);
function exCnt(dy,c){return W[dy].ex.reduce((a,_,i)=>a+(c&&c["e"+i]?1:0),0)}
/* level: 0=none 1=partial 2=full(all main exercises) */
function lvOf(dy,c){if(!anyChk(c))return 0;return exCnt(dy,c)>=W[dy].ex.length?2:1}
function dayMap(){
  const map={};
  gj("k.log",[]).forEach(e=>{                 /* old finalized records (pre-v5) */
    const lv=(e.tt!=null&&e.tt>0&&e.dn<e.tt)?1:2;
    const m=map[e.d]=map[e.d]||{};
    m[e.day]=Math.max(m[e.day]||0,lv);
  });
  const ds=DAYS();                            /* new auto-saved checks */
  Object.keys(ds).forEach(d=>{
    ["push","pull","light"].forEach(k=>{
      const lv=lvOf(k,ds[d][k]);
      if(lv){const m=map[d]=map[d]||{};m[k]=Math.max(m[k]||0,lv);}
    });
  });
  return map;
}
function week(){const m=dayMap(),mon=monday();return Object.keys(m).filter(d=>new Date(d+"T00:00:00")>=mon).length}
function lastInfo(){const m=dayMap();const ds=Object.keys(m).sort();if(!ds.length)return null;
  const d=ds[ds.length-1],t=m[d];return {d,k:(t.push?"push":t.pull?"pull":"light")};}
function suggest(){
  const td=DAYS()[today()];
  if(td){const k=["push","pull","light"].find(x=>anyChk(td[x]));if(k)return k;}
  const m=dayMap();const ds=Object.keys(m).sort();
  for(let i=ds.length-1;i>=0;i--){const t=m[ds[i]];if(t.push)return"pull";if(t.pull)return"push";}
  return"push";
}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;
  t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3400);}

let day="push";

/* ===== render ===== */
function rowEx(e,key,opt){
  const on=!!(((DAYS()[today()]||{})[day])||{})[key];
  const el=document.createElement("div");
  el.className="ex"+(opt?" opt":"")+(on?" on":"");
  el.tabIndex=0; el.setAttribute("role","button"); el.setAttribute("aria-pressed",on);
  const col=MC[e.mc]||"#555";
  el.style.borderLeft="4px solid "+col;
  const ws=gj("k.w",{}); const wv=(ws[e.n]!=null)?ws[e.n]:e.w;
  el.innerHTML=`<div class="box"></div>
    ${e.mc?`<div class="anat">${bodySVG(e.mc)}<span class="side">${BACKV[e.mc]?"後":"前"}</span></div>`:""}
    <div class="body"><div class="name">${e.m?`<span class="mtag" style="background:${col}">${e.m}</span>`:""}${e.n}${e.tag?`<span class="badge${e.tagType==='bar'?' bar':''}">${e.tag}</span>`:""}</div>
    <div class="sub">${e.s}</div>
    ${e.c?`<div class="care">⚠ ${e.c}</div>`:""}
    ${e.w!=null?`<div class="wctl"><button class="wbtn" data-op="-" aria-label="重さを減らす">−</button><span class="wval"><span class="wnum">${wv}</span><small>kg</small></span><button class="wbtn" data-op="+" aria-label="重さを増やす">＋</button><span class="wnote">${e.u||"片手"}</span></div>`:""}
    </div>
    ${e.f?`<a class="howto" href="${e.f}" target="_blank" rel="noopener">解説 ▷</a>`:""}`;
  const toggle=()=>{
    const ds=DAYS(),td=today();
    ds[td]=ds[td]||{};const c=ds[td][day]=ds[td][day]||{};
    const before=lvOf(day,c);
    c[key]=!c[key];sj("k.days",ds);
    el.classList.toggle("on",c[key]);el.setAttribute("aria-pressed",!!c[key]);
    document.getElementById("week").textContent=week();
    renderCal();
    if(before<2&&lvOf(day,c)===2)showToast(`${NAME[day]} 全種目クリア ✓  今週${week()}日目`);
  };
  el.addEventListener("click",ev=>{if(ev.target.closest(".howto")||ev.target.closest(".wctl"))return;toggle();});
  const wc=el.querySelector(".wctl");
  if(wc){wc.addEventListener("click",ev=>{ev.stopPropagation();
    const b=ev.target.closest(".wbtn");if(!b)return;
    const m=gj("k.w",{});let v=(m[e.n]!=null)?m[e.n]:e.w;
    v=Math.max(1,v+(b.dataset.op==="+"?1:-1));m[e.n]=v;sj("k.w",m);
    el.querySelector(".wnum").textContent=v;});}
  el.addEventListener("keydown",ev=>{if(ev.target===el&&(ev.key===" "||ev.key==="Enter")){ev.preventDefault();toggle();}});
  const ht=el.querySelector(".howto");
  if(ht)ht.addEventListener("click",ev=>ev.stopPropagation());
  return el;
}
function render(){
  document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected",t.dataset.day===day));
  const w=W[day], list=document.getElementById("list");
  list.innerHTML="";
  w.ex.forEach((e,i)=>list.appendChild(rowEx(e,"e"+i,false)));
  w.opt.forEach((e,i)=>{list.appendChild(rowEx(e,"o"+i,true));
    if(e.note){const n=document.createElement("div");n.className="note";n.textContent=e.note;list.appendChild(n);}});
  const vids=document.getElementById("videos");
  vids.innerHTML="";
  w.vid.forEach(v=>{const a=document.createElement("a");a.className="vid";a.href=v.u;a.target="_blank";a.rel="noopener";
    a.innerHTML=`<div class="pl">▶</div><div><div class="vn">${v.n}${v.want?'<span class="want">★やりたい</span>':""}</div><div class="vt">YouTube</div></div>`;
    vids.appendChild(a);});
  const vs=document.getElementById("vidSec");
  vs.style.display=w.vid.length?"":"none";vids.style.display=w.vid.length?"":"none";
  const rec=suggest();
  document.querySelectorAll(".tab .rec").forEach(r=>{r.style.display=(r.closest(".tab").dataset.day===rec)?"":"none";});
  const li=lastInfo();
  document.getElementById("last").innerHTML=li?NAME[li.k]+` <span style="color:var(--sub);font-weight:400">${li.d.slice(5)}</span>`:"—";
  document.getElementById("week").textContent=week();
}

/* ===== events ===== */
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{day=t.dataset.day;render();}));

/* ===== calendar ===== */
let calY,calM;
function renderCal(){
  document.getElementById("calTitle").textContent=`${calY}年${calM+1}月`;
  const map=dayMap();
  const dows=["月","火","水","木","金","土","日"];
  let html=dows.map((x,i)=>`<div class="cal-dow${i===5?" sat":i===6?" sun":""}">${x}</div>`).join("");
  const first=(new Date(calY,calM,1).getDay()+6)%7;
  const days=new Date(calY,calM+1,0).getDate();
  const td=today();
  for(let i=0;i<first;i++)html+=`<div class="cal-cell"></div>`;
  for(let d=1;d<=days;d++){
    const key=`${calY}-${String(calM+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const t=map[key];
    const kind=t?(t.push?"push":t.pull?"pull":"light"):"";
    const dow=new Date(calY,calM,d).getDay();
    let cls="cal-cell";
    if(dow===6)cls+=" sat";else if(dow===0)cls+=" sun";
    if(kind)cls+=" done "+kind+(t[kind]===1?" pt":"");
    if(key===td)cls+=" today";
    html+=`<div class="${cls}">${d}</div>`;
  }
  document.getElementById("calGrid").innerHTML=html;
}
document.getElementById("calPrev").addEventListener("click",()=>{calM--;if(calM<0){calM=11;calY--;}renderCal();});
document.getElementById("calNext").addEventListener("click",()=>{calM++;if(calM>11){calM=0;calY++;}renderCal();});

/* ===== init ===== */
(function(){
  /* migrate: old per-tab checks (pre auto-save) -> today's record */
  const ds=DAYS();let mig=false;
  ["push","pull","light"].forEach(k=>{
    const c=gj("k.chk."+k,{});
    if(anyChk(c)){const td=today();ds[td]=ds[td]||{};ds[td][k]=Object.assign({},c,ds[td][k]||{});sj("k.chk."+k,{});mig=true;}
  });
  if(mig)sj("k.days",ds);
  const d=new Date();const wd=["日","月","火","水","木","金","土"][d.getDay()];
  document.getElementById("today").textContent=today().replace(/-/g,".")+`（${wd}）`;
  calY=d.getFullYear();calM=d.getMonth();
  day=suggest();
  render();renderCal();})();
</script>
</body>
